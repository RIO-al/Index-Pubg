<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PUBG UC Store</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#0f0f0f;
color:#fff;
}

/* Header */
header{
background:#111;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
font-weight:bold;
color:#f7c948;
}

.nav-icons{
display:flex;
gap:15px;
font-size:20px;
}

/* Hero */
.hero{
background:url("bg.jpg") center/cover no-repeat;
height:260px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:32px;
color:#fff;
margin-bottom:10px;
}

.hero p{
font-size:16px;
color:#ddd;
}

/* Section */
.section{
padding:30px 20px;
max-width:1200px;
margin:auto;
}

.section-title{
font-size:24px;
margin-bottom:20px;
color:#f7c948;
}

/* Filters */
.filters{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

.filters select{
padding:12px;
border:none;
border-radius:8px;
background:#1a1a1a;
color:#fff;
min-width:180px;
}

/* Cards */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1a1a1a;
border-radius:14px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,.3);
transition:.3s;
border:1px solid #222;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
text-align:center;
}

.card-title{
font-size:18px;
margin-bottom:10px;
}

.price{
color:#f7c948;
font-size:20px;
font-weight:bold;
margin-bottom:12px;
}

.buy-btn{
background:#f7c948;
color:#111;
padding:10px 18px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
}

/* Footer */
footer{
margin-top:40px;
padding:20px;
text-align:center;
background:#111;
border-top:1px solid #222;
color:#999;
}

/* Mobile */
@media(max-width:768px){
.hero{
height:200px;
}

.hero h1{
font-size:24px;
}

.section-title{
font-size:20px;
}
}
</style>
</head>
<body>

<header>
<div class="logo">PUBG UC</div>
<div class="nav-icons">
<span>☰</span>
<span>🛒</span>
</div>
</header>

<section class="hero">
<div class="hero-content">
<h1>شحن شدات PUBG Mobile</h1>
<p>اختر الباقة المناسبة واشحن بسرعة وأمان</p>
</div>
</section>

<section class="section">
<h2 class="section-title">اختر الباقة</h2>

<div class="filters">
<select>
<option>اختر الدولة</option>
<option>العراق</option>
<option>السعودية</option>
<option>الإمارات</option>
</select>

<select>
<option>اختر وسيلة الدفع</option>
<option>Zain Cash</option>
<option>Asia Hawala</option>
<option>Master Card</option>
</select>
</div>

<div class="cards">

<div class="card">
<img src="uc.png" alt="UC 60">
<div class="card-body">
<div class="card-title">60 UC</div>
<div class="price">$0.99</div>
<button class="buy-btn">شراء الآن</button>
</div>
</div>

<div class="card">
<img src="uc.png" alt="UC 325">
<div class="card-body">
<div class="card-title">325 UC</div>
<div class="price">$4.99</div>
<button class="buy-btn">شراء الآن</button>
</div>
</div>

<div class="card">
<img src="uc.png" alt="UC 660">
<div class="card-body">
<div class="card-title">660 UC</div>
<div class="price">$9.99</div>
<button class="buy-btn">شراء الآن</button>
</div>
</div>

<div class="card">
<img src="uc.png" alt="UC 1800">
<div class="card-body">
<div class="card-title">1800 UC</div>
<div class="price">$24.99</div>
<button class="buy-btn">شراء الآن</button>
</div>
</div>

</div>
</section>

<footer>
جميع الحقوق محفوظة © PUBG UC Store
</footer>

</body>
</html>
